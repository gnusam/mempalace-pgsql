services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: mempalace
      POSTGRES_USER: mempalace
      POSTGRES_PASSWORD: mempalace
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./mempalace/init_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mempalace"]
      interval: 2s
      timeout: 5s
      retries: 10

  mempalace:
    build: .
    environment:
      DATABASE_URL: postgresql://mempalace:mempalace@postgres:5432/mempalace
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - model-cache:/root/.cache
      - /home/sam/dev:/projects:ro
      - ./mempalace:/app/mempalace:ro
      - ./tests:/app/tests:ro

volumes:
  pgdata:
  model-cache:
